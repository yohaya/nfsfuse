name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore: ['bin/**', 'VERSION']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  LIBNFS_TAG: libnfs-6.0.2

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute build number and bump version
        id: meta
        run: |
          # Read current version and bump patch
          CURRENT=$(cat VERSION)
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          PATCH=$((PATCH + 1))
          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "$VERSION" > VERSION

          BUILD=$(git rev-list --count HEAD)
          BUILD_DATE=$(date -u +%Y-%m-%d_%H:%M:%S_UTC)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "date=$BUILD_DATE" >> "$GITHUB_OUTPUT"
          echo "Building nfsfuse $VERSION build $BUILD ($BUILD_DATE)"

      - name: Build static binary in Alpine container
        run: |
          docker run --rm -v "$PWD:/src" -w /src \
            -e VERSION="${{ steps.meta.outputs.version }}" \
            -e BUILD="${{ steps.meta.outputs.build }}" \
            -e BUILD_DATE="${{ steps.meta.outputs.date }}" \
            -e LIBNFS_TAG="${{ env.LIBNFS_TAG }}" \
            alpine:latest sh -exc '
            apk add --no-cache \
              gcc musl-dev make cmake git meson ninja pkgconf linux-headers

            # Build libnfs as static library
            git clone --depth 1 --branch "$LIBNFS_TAG" https://github.com/sahlberg/libnfs.git /tmp/libnfs
            cd /tmp/libnfs
            mkdir build && cd build
            cmake .. \
              -DCMAKE_INSTALL_PREFIX=/usr \
              -DCMAKE_BUILD_TYPE=Release \
              -DBUILD_SHARED_LIBS=OFF
            make -j$(nproc)
            make install

            # Build libfuse3 as static library
            git clone --depth 1 https://github.com/libfuse/libfuse.git /tmp/libfuse
            cd /tmp/libfuse
            mkdir build && cd build
            meson setup .. \
              --default-library=static \
              --prefix=/usr \
              -Dexamples=false \
              -Dutils=false
            ninja
            ninja install

            # Compile nfsfuse as fully static binary
            cd /src
            export PKG_CONFIG_PATH=/usr/lib/pkgconfig:/usr/lib64/pkgconfig
            mkdir -p bin
            gcc -O2 -Wall -o bin/nfsfuse nfsfuse.c \
              -static \
              -DNFSFUSE_VERSION="\"$VERSION\"" \
              -DNFSFUSE_BUILD="\"$BUILD\"" \
              -DNFSFUSE_LIBNFS_VERSION="\"$LIBNFS_TAG\"" \
              -DNFSFUSE_BUILD_DATE="\"$BUILD_DATE\"" \
              -DNFSFUSE_BUILD_HOST="\"github-actions\"" \
              $(pkg-config --cflags fuse3 libnfs) \
              $(pkg-config --libs --static fuse3 libnfs) \
              -lpthread
            strip bin/nfsfuse
          '

      - name: Show binary info
        run: |
          file bin/nfsfuse
          ls -lh bin/nfsfuse
          bin/nfsfuse --version

      - name: Commit binary and version to repo
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f bin/nfsfuse VERSION
          git diff --cached --quiet && echo "No changes" || git commit -m "Build ${{ steps.meta.outputs.version }} (${{ steps.meta.outputs.date }})" && git push

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: nfsfuse

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: nfsfuse
          generate_release_notes: true
