name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore: ['bin/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build static binary in Alpine container
        run: |
          docker run --rm -v "$PWD:/src" -w /src alpine:latest sh -exc '
            apk add --no-cache \
              gcc musl-dev make cmake git meson ninja pkgconf linux-headers

            # Build latest libnfs as static library
            git clone --depth 1 https://github.com/sahlberg/libnfs.git /tmp/libnfs
            cd /tmp/libnfs
            mkdir build && cd build
            cmake .. \
              -DCMAKE_INSTALL_PREFIX=/usr \
              -DCMAKE_BUILD_TYPE=Release \
              -DBUILD_SHARED_LIBS=OFF
            make -j$(nproc)
            make install

            # Build libfuse3 as static library
            git clone --depth 1 https://github.com/libfuse/libfuse.git /tmp/libfuse
            cd /tmp/libfuse
            mkdir build && cd build
            meson setup .. \
              --default-library=static \
              --prefix=/usr \
              -Dexamples=false \
              -Dutils=false
            ninja
            ninja install

            # Compile nfsfuse as fully static binary
            cd /src
            export PKG_CONFIG_PATH=/usr/lib/pkgconfig:/usr/lib64/pkgconfig
            mkdir -p bin
            gcc -O2 -Wall -o bin/nfsfuse nfsfuse.c \
              -static \
              $(pkg-config --cflags fuse3 libnfs) \
              $(pkg-config --libs --static fuse3 libnfs) \
              -lpthread
            strip bin/nfsfuse
          '

      - name: Show binary info
        run: |
          file bin/nfsfuse
          ls -lh bin/nfsfuse

      - name: Commit binary to repo
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f bin/nfsfuse
          git diff --cached --quiet && echo "No changes" || git commit -m "Update bin/nfsfuse" && git push

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: nfsfuse

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: nfsfuse
          generate_release_notes: true
